<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Carlos Council mark">
  <title>Carlos Council</title>
  <!-- Warm council ring: a quiet compass for a wise companion -->
  <circle cx="64" cy="64" r="60" fill="#FFFBEB"/>
  <circle cx="64" cy="64" r="60" stroke="#B45309" stroke-width="3"/>
  <!-- Four cardinal ticks — the four phases of the council -->
  <g stroke="#B45309" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="64" y1="10" x2="64" y2="20"/>
    <line x1="64" y1="108" x2="64" y2="118"/>
    <line x1="10" y1="64" x2="20" y2="64"/>
    <line x1="108" y1="64" x2="118" y2="64"/>
  </g>
  <!-- Carlos's paw at the centre -->
  <g fill="#B45309">
    <!-- main pad -->
    <path d="M64 96c-9 0-16-6-16-14 0-7 7-11 16-11s16 4 16 11c0 8-7 14-16 14z"/>
    <!-- toes -->
    <ellipse cx="45" cy="60" rx="7" ry="9" transform="rotate(-18 45 60)"/>
    <ellipse cx="57" cy="50" rx="7" ry="10"/>
    <ellipse cx="71" cy="50" rx="7" ry="10"/>
    <ellipse cx="83" cy="60" rx="7" ry="9" transform="rotate(18 83 60)"/>
  </g>
</svg>
